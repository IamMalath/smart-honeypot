<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Smart Honeypot{% endblock %}</title>
  <style>
    :root {
      --bg:#0f1115; --panel:#1a1d24; --line:#2a2f3a;
      --text:#dde1e8; --muted:#7b8390; --accent:#7cb6ff;
    }
    * { box-sizing: border-box; }
    body {
      margin:0; font-family: -apple-system, "SF Pro Text", "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text); font-size: 14px;
    }
    header {
      background: var(--panel); border-bottom: 1px solid var(--line);
      padding: 14px 24px; display: flex; align-items: center; gap: 24px;
    }
    header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    header nav a {
      color: var(--muted); text-decoration: none; margin-right: 18px;
      font-size: 13px;
    }
    header nav a:hover, header nav a.active { color: var(--accent); }
    main { max-width: 1180px; margin: 0 auto; padding: 24px; }
    h2 { font-size: 15px; text-transform: uppercase; letter-spacing: 0.06em;
         color: var(--muted); margin: 28px 0 12px; font-weight: 600; }
    .grid { display: grid; gap: 16px; }
    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    .grid-2 { grid-template-columns: 1fr 1fr; }
    .card {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 8px; padding: 16px;
    }
    .stat { font-size: 28px; font-weight: 600; }
    .stat-label { color: var(--muted); font-size: 12px; text-transform: uppercase;
                  letter-spacing: 0.05em; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--line);
             font-size: 13px; vertical-align: top; }
    th { color: var(--muted); font-weight: 500; text-transform: uppercase;
         font-size: 11px; letter-spacing: 0.06em; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    a { color: var(--accent); }
    code, pre { font-family: ui-monospace, "SF Mono", Menlo, monospace;
                font-size: 12px; }
    pre { background: #0a0c10; padding: 10px; border-radius: 6px;
          overflow-x: auto; border: 1px solid var(--line); }
    .pill {
      display: inline-block; padding: 2px 10px; border-radius: 10px;
      font-size: 11px; background: #2a2f3a; color: var(--text);
      margin-right: 4px;
    }
    .pill-tech { background: #233042; color: #9bc6ff; }
    .timeline-row { border-left: 2px solid var(--line); padding: 6px 0 14px 12px;
                    margin-left: 6px; position: relative; }
    .timeline-row::before { content:''; width:8px; height:8px; border-radius:50%;
                            background: var(--accent); position:absolute;
                            left: -5px; top: 10px; }
    .muted { color: var(--muted); }
    .heatmap { display: flex; flex-wrap: wrap; gap: 4px; }
    .heatmap div { padding: 4px 8px; border-radius: 4px; font-size: 11px;
                   background: #233042; color: #9bc6ff; }
  </style>
</head>
<body>
<header>
  <h1>Smart Honeypot</h1>
  <nav>
    <a href="/" class="{% if request.path == '/' %}active{% endif %}">Overview</a>
    <a href="/sessions" class="{% if '/sessions' in request.path %}active{% endif %}">Sessions</a>
  </nav>
  <span class="muted" style="margin-left:auto">attacker behaviour analysis</span>
</header>
<main>
  {% block content %}{% endblock %}
</main>
</body>
</html>
